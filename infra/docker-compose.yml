
services:
  postgres:
    image: postgres:16-alpine
    container_name: studentska_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studentska}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studentska_pass}
      POSTGRES_DB: ${POSTGRES_DB:-studentska_platforma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studentska} -d ${POSTGRES_DB:-studentska_platforma}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studentska_net

  redis:
    image: redis:7-alpine
    container_name: studentska_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studentska_net

  minio:
    image: minio/minio:latest
    container_name: studentska_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - studentska_net

  minio-init:
    image: minio/mc:latest
    container_name: studentska_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    networks:
      - studentska_net
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: studentska_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studentska_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: studentska_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-studentska}:${POSTGRES_PASSWORD:-studentska_pass}@postgres:5432/${POSTGRES_DB:-studentska_platforma}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      PYTHONPATH: /app
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
      - ../scripts:/scripts:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studentska_net
    profiles:
      - app

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: studentska_celery_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-studentska}:${POSTGRES_PASSWORD:-studentska_pass}@postgres:5432/${POSTGRES_DB:-studentska_platforma}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - studentska_net
    profiles:
      - app

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: studentska_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-studentska}:${POSTGRES_PASSWORD:-studentska_pass}@postgres:5432/${POSTGRES_DB:-studentska_platforma}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - studentska_net
    profiles:
      - app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: studentska_frontend
    restart: unless-stopped
    env_file:
      - ../frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - studentska_net
    profiles:
      - app

